<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BTS Training</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111113;
  --surface:#1c1c1e;
  --surface2:#242426;
  --border:#2c2c2e;
  --border2:#3a3a3c;
  --text:#ffffff;
  --text2:#ebebf5cc;
  --text3:#ebebf599;
  --accent:#4f8ef7;
  --accent2:#e8ff47;
  --green:#30d158;
  --red:#ff453a;
  --orange:#ff9f0a;
  --purple:#bf5af2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.on{display:flex}

/* ── NAV BAR ── */
.navbar{background:rgba(17,17,19,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 12px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.nav-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);font-size:22px;margin-right:8px;flex-shrink:0}
.nav-title{font-size:17px;font-weight:700;letter-spacing:-.3px;flex:1}
.nav-sub{font-size:12px;color:var(--text3);margin-top:1px;font-weight:500}
.nav-action{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer}

/* ── HOME SCREEN ── */
.home-header{padding:20px 16px 16px;background:var(--bg)}
.home-date{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.home-title{font-size:28px;font-weight:800;letter-spacing:-.5px}

/* STATS RINGS */
.stats-card{margin:0 16px 16px;background:var(--surface);border-radius:20px;padding:20px;border:1px solid var(--border)}
.stats-rings{display:flex;justify-content:space-around;align-items:center;margin-bottom:16px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-label{text-align:center}
.ring-num{font-size:22px;font-weight:800;line-height:1}
.ring-sub{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px}
.ring-caption{font-size:12px;color:var(--text2);font-weight:600;text-align:center}
.stats-divider{height:1px;background:var(--border);margin:0 -20px 16px}
.stats-row{display:flex;justify-content:space-around}
.stat-item{text-align:center}
.stat-num{font-size:18px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px}

/* BLOCK SECTION */
.block-section{padding:0 16px 8px}
.block-label{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.block-dot{width:6px;height:6px;border-radius:50%}
.weeks-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px}
.week-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.week-btn:active{transform:scale(.95);background:var(--surface2)}
.week-btn.f{border-top:2px solid var(--accent)}
.week-btn.r{border-top:2px solid var(--orange)}
.week-btn.complete{background:rgba(48,209,88,.08);border-color:rgba(48,209,88,.3)}
.week-num{font-size:18px;font-weight:800;letter-spacing:-.5px}
.week-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.week-dots{display:flex;gap:2px;justify-content:center;margin-top:5px}
.wdot{width:4px;height:4px;border-radius:50%;background:var(--border2)}
.wdot.done{background:var(--green)}

/* RESET BUTTON */
.reset-row{padding:0 16px 24px;display:flex;justify-content:flex-end}
.reset-btn{background:none;border:1px solid var(--border2);border-radius:10px;color:var(--text3);font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer}

/* ── DAY SELECT ── */
.day-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s}
.day-card:active{transform:scale(.98);background:var(--surface2)}
.day-icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.day-info{flex:1}
.day-title{font-size:17px;font-weight:700;letter-spacing:-.2px}
.day-sub{font-size:13px;color:var(--text3);font-weight:500;margin-top:2px}
.day-right{text-align:right;flex-shrink:0}
.day-count{font-size:24px;font-weight:800;letter-spacing:-.5px}
.day-count-lbl{font-size:11px;color:var(--text3);font-weight:500}
.day-done-badge{background:rgba(48,209,88,.15);border:1px solid rgba(48,209,88,.3);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--green)}

/* ── WORKOUT SCREEN ── */
.workout-meta{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.meta-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.meta-val{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
.meta-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.meta-divider{width:1px;height:32px;background:var(--border)}

.workout-list{padding:12px 16px 140px;display:flex;flex-direction:column;gap:14px}

/* EXERCISE BLOCK */
.ex-block{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.ex-block-header{padding:14px 14px 10px;display:flex;align-items:center;gap:10px}
.ex-num-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.ex-block-info{flex:1;min-width:0}
.ex-block-name{font-size:16px;font-weight:700;letter-spacing:-.2px;cursor:pointer}
.ex-block-name:active{opacity:.7}
.ex-block-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.ex-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--text3);font-weight:500}
.ex-tag.reps{color:var(--accent2);border-color:rgba(232,255,71,.25);background:rgba(232,255,71,.06)}
.ex-tag.rpe{color:var(--red);border-color:rgba(255,69,58,.25)}
.ex-tag.rest-tag{color:var(--accent);border-color:rgba(79,142,247,.25)}
.ex-demo-btn{background:var(--accent2);color:#000;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px}
.ex-demo-btn:active{opacity:.8}
.ex-toggle{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;flex-shrink:0}

/* VIDEO */
.ex-video{position:relative;padding-bottom:56.25%;background:#000;display:none}
.ex-video.open{display:block}
.ex-video iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.ex-video-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.8);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}

/* SET TABLE */
.set-table{width:100%}
.set-table-head{display:grid;grid-template-columns:44px 1fr 44px;gap:4px;padding:6px 14px 6px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface2)}
.set-table-head span{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);text-align:center}
.set-table-head span:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:44px 1fr 44px;gap:4px;padding:8px 14px;align-items:center;border-bottom:1px solid var(--border);transition:background .15s}
.set-row:last-child{border-bottom:none}
.set-row.logged{background:rgba(48,209,88,.04)}
.set-num{font-size:13px;font-weight:700;color:var(--text3)}
.set-cell{display:flex;flex-direction:column;align-items:stretch;gap:3px}
.set-prev-val{font-size:10px;color:var(--text3);font-weight:500;min-height:13px}
.set-prev-val.has-prev{color:var(--accent)}
.set-input-wrap{display:flex;align-items:center;gap:3px;width:100%}
.set-adj{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);width:28px;height:30px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
.set-adj:active{background:var(--border2)}
.set-inp{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-weight:700;text-align:center;padding:4px 2px;flex:1;min-width:0;outline:none;-webkit-appearance:none;font-family:'Inter',sans-serif}
.set-inp:focus{border-color:var(--accent);background:rgba(79,142,247,.08)}
.set-inp.filled{color:var(--green);border-color:rgba(48,209,88,.4)}
.set-check{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation;transition:all .2s}
.set-check.done{background:var(--accent);border-color:var(--accent)}
.set-check-icon{width:14px;height:14px;fill:none;stroke:#000;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
.set-check.done .set-check-icon{opacity:1}

/* PREV WEEK INDICATOR */
.prev-label{font-size:10px;color:var(--text3);font-weight:500}

/* SUBS */
.subs-section{border-top:1px solid var(--border);padding:12px 14px}
.subs-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.sub-item:last-child{border-bottom:none}
.sub-name{font-size:14px;color:var(--text2);font-weight:500}
.sub-demo{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.2);border-radius:8px;color:var(--accent2);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}

/* NOTES */
.notes-box{border-top:1px solid var(--border);padding:10px 14px}
.notes-text{font-size:12px;color:var(--text3);line-height:1.5;padding:8px 10px;background:rgba(255,159,10,.06);border-left:2px solid var(--orange);border-radius:0 6px 6px 0}

/* INLINE PROGRESS */
.inline-prog{border-top:1px solid var(--border);padding:10px 14px}
.inline-prog-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.inline-prog-rows{display:flex;flex-direction:column;gap:4px}
.inline-prog-row{display:flex;align-items:center;justify-content:space-between}
.inline-wk{font-size:12px;color:var(--text3);font-weight:500;width:50px}
.inline-val{font-size:14px;font-weight:700;color:var(--text)}
.inline-val.best{color:var(--accent2)}
.view-all-btn{display:block;text-align:center;margin-top:8px;font-size:13px;font-weight:600;color:var(--accent);padding:7px;background:rgba(79,142,247,.08);border-radius:10px;border:1px solid rgba(79,142,247,.2);cursor:pointer}

/* COMPLETE BUTTON */
.complete-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:rgba(17,17,19,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:none;z-index:50}
.complete-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;letter-spacing:-.2px;cursor:pointer;touch-action:manipulation}
.complete-btn:active{opacity:.85}

/* ── TIMER ── */
.timer-overlay{display:none;position:fixed;bottom:0;left:0;right:0;padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:rgba(17,17,19,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:200;flex-direction:column;gap:10px}
.timer-overlay.active{display:flex}
.timer-top{display:flex;align-items:center;justify-content:space-between}
.timer-left{display:flex;flex-direction:column}
.timer-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.timer-count{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1;color:var(--accent2)}
.timer-count.urgent{color:var(--red)}
.timer-skip{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;color:var(--text);padding:10px 20px;font-size:15px;font-weight:700;cursor:pointer}
.timer-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width .5s linear}
.timer-fill.urgent{background:var(--red)}

/* ── PROGRESS SCREEN ── */
#sp{background:var(--bg)}
.prog-body{padding:14px 16px;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.section-title{font-size:13px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-val{font-size:9px;font-weight:700;color:var(--accent2);min-height:12px;text-align:center}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;background:var(--accent);transition:height .4s ease}
.bar.best{background:var(--accent2)}
.bar-wk{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.max-label{font-size:12px;color:var(--text3);font-weight:500;text-align:center}
.max-label span{color:var(--accent2);font-weight:700}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.hist-row{display:grid;grid-template-columns:56px 1fr;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-wk{padding:12px 12px;font-size:12px;color:var(--text3);font-weight:600;border-right:1px solid var(--border);display:flex;align-items:flex-start;padding-top:14px}
.hist-sets{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.hist-set{font-size:14px;font-weight:600;color:var(--text2)}
.hist-set.best-set{color:var(--accent2);font-weight:800}
.prog-empty{text-align:center;padding:32px;color:var(--text3);font-size:14px;line-height:1.6}

/* ── COLOR HELPERS ── */
.c-upper{color:#4f8ef7;background:rgba(79,142,247,.12)}
.c-lower{color:#30d158;background:rgba(48,209,88,.12)}
.c-pull{color:#bf5af2;background:rgba(191,90,242,.12)}
.c-push{color:#ff9f0a;background:rgba(255,159,10,.12)}
.c-legs{color:#ff453a;background:rgba(255,69,58,.12)}
.border-upper{border-left:3px solid #4f8ef7}
.border-lower{border-left:3px solid #30d158}
.border-pull{border-left:3px solid #bf5af2}
.border-push{border-left:3px solid #ff9f0a}
.border-legs{border-left:3px solid #ff453a}
.stroke-upper{stroke:#4f8ef7}
.stroke-lower{stroke:#30d158}
.stroke-pull{stroke:#bf5af2}
.stroke-push{stroke:#ff9f0a}
.stroke-legs{stroke:#ff453a}

/* ADD EXERCISE */
.add-ex-card{background:var(--surface);border:1px dashed var(--border2);border-radius:18px;margin:0 0 14px;overflow:hidden}
.add-ex-toggle{width:100%;background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif}
.add-ex-toggle:active{opacity:.7}
.add-ex-form{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.add-ex-form.open{display:block}
.add-ex-field{margin-top:12px}
.add-ex-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.add-ex-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:15px;font-weight:500;padding:11px 12px;outline:none;font-family:'Inter',sans-serif}
.add-ex-input:focus{border-color:var(--accent);background:rgba(79,142,247,.06)}
.add-ex-row{display:flex;gap:8px;margin-top:12px}
.add-ex-num{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:15px;font-weight:600;padding:11px 10px;outline:none;text-align:center;font-family:'Inter',sans-serif;-webkit-appearance:none}
.add-ex-num:focus{border-color:var(--accent)}
.add-ex-submit{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px;font-family:'Inter',sans-serif}
.add-ex-submit:active{opacity:.85}
.custom-badge{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--accent);margin-left:6px}
.remove-custom{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;flex-shrink:0;line-height:1}
.remove-custom:active{color:var(--red)}
</style>
</head>
<body>

<!-- ══ HOME ══════════════════════════════════════════════════════════════════ -->
<div id="sw" class="screen on">
  <div class="home-header">
    <div class="home-date" id="homeDate"></div>
    <div class="home-title">Dashboard</div>
  </div>

  <!-- Stats card -->
  <div class="stats-card">
    <div class="stats-rings" id="statsRings">
      <!-- Built by JS -->
    </div>
    <div class="stats-divider"></div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <!-- Foundation Block -->
  <div class="block-section">
    <div class="block-label"><div class="block-dot" style="background:#4f8ef7"></div><span style="color:#4f8ef7">Foundation Block</span><span style="color:var(--text3);font-weight:400">· Weeks 1–5</span></div>
    <div class="weeks-grid" id="fg"></div>
  </div>

  <!-- Ramping Block -->
  <div class="block-section">
    <div class="block-label"><div class="block-dot" style="background:#ff9f0a"></div><span style="color:#ff9f0a">Ramping Block</span><span style="color:var(--text3);font-weight:400">· Weeks 6–12</span></div>
    <div class="weeks-grid" id="rg"></div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="resetBtn">↺ Reset All Data</button>
  </div>
</div>

<!-- ══ DAY SELECT ════════════════════════════════════════════════════════════ -->
<div id="sd" class="screen">
  <div class="navbar">
    <div class="nav-back">‹</div>
    <div><div class="nav-title" id="dayNavTitle"></div><div class="nav-sub" id="dayNavSub"></div></div>
  </div>
  <div class="day-list" id="dl"></div>
</div>

<!-- ══ WORKOUT ═══════════════════════════════════════════════════════════════ -->
<div id="sk" class="screen">
  <div class="navbar">
    <div class="nav-back">‹</div>
    <div style="flex:1"><div class="nav-title" id="wkNavTitle"></div><div class="nav-sub" id="wkNavSub"></div></div>
  </div>
  <div class="workout-meta" id="workoutMeta">
    <div class="meta-item"><div class="meta-val" id="metaTime">0:00</div><div class="meta-lbl">Time</div></div>
    <div class="meta-divider"></div>
    <div class="meta-item"><div class="meta-val" id="metaSets">0/0</div><div class="meta-lbl">Sets</div></div>
    <div class="meta-divider"></div>
    <div class="meta-item"><div class="meta-val" id="metaVol">0 lb</div><div class="meta-lbl">Volume</div></div>
  </div>
  <div class="workout-list" id="wkl"></div>
  <div class="complete-bar" id="completeBar">
    <button class="complete-btn" id="completeBtn">Mark Day Complete</button>
  </div>

// ── STORAGE ──────────────────────────────────────────────────────────────────
function getUID(){let k='bts_uid',v=localStorage.getItem(k);if(!v){v='u'+Math.random().toString(36).slice(2,10);localStorage.setItem(k,v);}return v;}
const UID=getUID();
function stk(w,d,e,s,f){return`bts3|${UID}|${w}|${d}|${e}|${s}|${f}`;}
function dk(w,d){return`bts3|${UID}|done|${w}|${d}`;}
function sv(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function ld(k){try{return localStorage.getItem(k);}catch(e){return null;}}

function go(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));
  document.getElementById('s'+s).classList.add('on');
  window.scrollTo(0,0);
}

// ── HOME SCREEN ──────────────────────────────────────────────────────────────
function buildHome(){
  // Date
  const now=new Date();
  document.getElementById('homeDate').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();

  // Stats
  let totalDone=0,totalDays=0,totalSetsLogged=0,totalVol=0;
  Object.entries(P).forEach(([wk,wkd])=>{
    Object.entries(wkd.days||{}).forEach(([dn,exs])=>{
      totalDays++;
      if(ld(dk(wk,dn))==='1')totalDone++;
      exs.forEach((ex,i)=>{
        const sets=parseInt(ex.working_sets)||2;
        for(let s=0;s<sets;s++){
          const wt=parseInt(ld(stk(wk,dn,i,s,'w'))||'0');
          const rp=parseInt(ld(stk(wk,dn,i,s,'r'))||'0');
          const done=ld(stk(wk,dn,i,s,'d'))==='1';
          if(done){totalSetsLogged++;totalVol+=wt*rp;}
        }
      });
    });
  });

  // Rings: workouts done, sets, % complete
  const pctDone=totalDays>0?Math.round((totalDone/totalDays)*100):0;
  const R=40,C=2*Math.PI*R;
  const rings=[
    {val:totalDone,max:totalDays,label:'Days',sub:'Done',stroke:'#4f8ef7'},
    {val:totalSetsLogged,max:Math.max(totalSetsLogged,100),label:'Sets',sub:'Logged',stroke:'#ff9f0a'},
    {val:pctDone,max:100,label:pctDone+'%',sub:'Complete',stroke:'#30d158'},
  ];
  document.getElementById('statsRings').innerHTML=rings.map(r=>{
    const frac=r.max>0?Math.min(r.val/r.max,1):0;
    const offset=C-(frac*C);
    return`<div class="ring-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90" class="ring-svg">
        <circle cx="45" cy="45" r="${R}" class="ring-bg"/>
        <circle cx="45" cy="45" r="${R}" class="ring-fill" stroke="${r.stroke}"
          stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="ring-label"><div class="ring-num">${r.val}</div><div class="ring-sub">${r.sub}</div></div>
      <div class="ring-caption">${r.label}</div>
    </div>`;
  }).join('');

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-item"><div class="stat-num">${totalDone}</div><div class="stat-lbl">Workouts</div></div>
    <div class="stat-item"><div class="stat-num">${totalSetsLogged}</div><div class="stat-lbl">Sets</div></div>
    <div class="stat-item"><div class="stat-num">${totalVol>0?(totalVol>=1000?(totalVol/1000).toFixed(1)+'k':totalVol)+'lb':'0lb'}</div><div class="stat-lbl">Volume</div></div>
  `;

  // Week grids
  ['fg','rg'].forEach(id=>document.getElementById(id).innerHTML='');
  Object.entries(P).forEach(([wk,wkd])=>{
    const n=wk.split(' ')[1];
    const f=(wkd.block||'').includes('Foundation');
    const g=document.getElementById(f?'fg':'rg');
    const days=Object.keys(wkd.days||{});
    const doneDays=days.filter(d=>ld(dk(wk,d))==='1').length;
    const allDone=doneDays===days.length&&days.length>0;
    const b=document.createElement('div');
    b.className=`week-btn ${f?'f':'r'}${allDone?' complete':''}`;
    b.innerHTML=`<div class="week-num">W${n}</div><div class="week-lbl">${f?'FOUND.':'RAMP.'}</div><div class="week-dots">${days.map((_,i)=>`<div class="wdot ${i<doneDays?'done':''}"></div>`).join('')}</div>`;
    b.addEventListener('click',()=>selWeek(wk));
    g.appendChild(b);
  });
}

// ── DAY SELECT ────────────────────────────────────────────────────────────────
function selWeek(wk){

// ── WORKOUT ───────────────────────────────────────────────────────────────────
function selDay(wk,dn){
  cd=dn;
  const exs=P[wk].days[dn];
  const k=Object.keys(DAY_META).find(x=>dn.includes(x))||'Upper';
  document.getElementById('wkNavTitle').textContent=`${k} — ${dn.includes('Strength')?'Strength':'Hypertrophy'}`;
  document.getElementById('wkNavSub').textContent=`${wk} · ${P[wk].block}`;
  const pw=prevWk(wk);
  const list=document.getElementById('wkl');list.innerHTML='';
  exs.forEach((ex,i)=>buildExBlock(list,wk,dn,ex,i,pw,k));
  // Start workout clock
  workoutStart=Date.now();
  clearInterval(workoutTimer);
  workoutTimer=setInterval(updateWorkoutMeta,1000);
  updateWorkoutMeta();
  document.getElementById('completeBar').style.display='block';
  // Add custom exercise card at bottom + load any saved custom exercises
  buildAddExCard(wk,dn);
  loadCustomExercises(wk,dn);
  go('k');
}

function prevWk(wk){const n=parseInt(wk.split(' ')[1]);return n>1?`Week ${n-1}`:null;}

function updateWorkoutMeta(){
  if(!workoutStart)return;
  const elapsed=Math.floor((Date.now()-workoutStart)/1000);
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('metaTime').textContent=`${m}:${s<10?'0':''}${s}`;
  // Count logged sets & volume
  if(!cw||!cd)return;
  const exs=P[cw].days[cd];
  let done=0,total=0,vol=0;
  exs.forEach((ex,i)=>{
    const sets=parseInt(ex.working_sets)||2;
    total+=sets;
    for(let s=0;s<sets;s++){
      if(ld(stk(cw,cd,i,s,'d'))==='1'){
        done++;
        const wt=parseInt(ld(stk(cw,cd,i,s,'w'))||'0');
        const rp=parseInt(ld(stk(cw,cd,i,s,'r'))||'0');
        vol+=wt*rp;
      }
    }
  });
  // Also count custom exercises
  getCustomExercises(cw,cd).forEach(ex=>{
    const sets=ex.sets||3;
    total+=sets;
    for(let s=0;s<sets;s++){
      if(ld(stk(cw,cd,'c'+ex.id,s,'d'))==='1'){
        done++;
        const wt=parseInt(ld(stk(cw,cd,'c'+ex.id,s,'w'))||'0');
        const rp=parseInt(ld(stk(cw,cd,'c'+ex.id,s,'r'))||'0');
        vol+=wt*rp;
      }
    }
  });
  document.getElementById('metaSets').textContent=`${done}/${total}`;
  document.getElementById('metaVol').textContent=vol>0?`${vol} lb`:'0 lb';
}

function buildExBlock(list,wk,dn,ex,i,pw,dayKey){

        <div style="display:flex;align-items:center;gap:2px">

          <div class="set-input-wrap" style="flex:1">

            <input type="number" inputmode="decimal" class="set-inp${filled?' filled':''}" id="rv_${i}_${s}" value="${rp}" min="0" step="1" data-wk="${wk}" data-dn="${dn}" data-i="${i}" data-s="${s}" data-f="r">

          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);width:28px;flex-shrink:0">Wt</span>
          <div class="set-input-wrap" style="flex:1">

  let subsHTML='';

    subsHTML='<div class="subs-section"><div class="subs-label">Substitutions</div>';

        <span class="sub-name">${s}</span>

// ── EVENT DELEGATION ──────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  // Back
  if(e.target.closest('.nav-back')||e.target.closest('.back')){
    const s=e.target.closest('.screen')?.id;
    if(s==='sd'){go('w');buildHome();}
    else if(s==='sk'){clearInterval(workoutTimer);go('d');selWeek(cw);document.getElementById('completeBar').style.display='none';}
    else if(s==='sp'){go('k');}
    return;
  }
  // +/- buttons
  const adj=e.target.closest('.set-adj');
  if(adj){adjVal(adj.dataset.wk,adj.dataset.dn,adj.dataset.i,adj.dataset.s,adj.dataset.f,parseInt(adj.dataset.d));return;}
  // Set check
  const chk=e.target.closest('.set-check');
  if(chk){togDone(chk.dataset.wk,chk.dataset.dn,chk.dataset.i,chk.dataset.s);return;}
  // Main demo
  const demo=e.target.closest('.ex-demo-btn');
  if(demo){togVideo(demo.dataset.exidx,demo.dataset.embed);return;}
  // Sub demo
  const sdemo=e.target.closest('.sub-demo');

function togDone(wk,dn,i,s){

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timerInt=null,timerTotal=120,timerLeft=0;
function parseRestSecs(r){if(!r)return 120;let m=r.match(/(\d+)-(\d+)/);if(m)return parseInt(m[1])*60;m=r.match(/(\d+)/);if(m)return parseInt(m[1])*60;return 120;}
function startTimer(secs){
  clearInterval(timerInt);timerTotal=secs;timerLeft=secs;
  document.getElementById('timerOverlay').classList.add('active');
  renderTimer();
  timerInt=setInterval(()=>{
    timerLeft--;renderTimer();
    if(timerLeft<=0){
      clearInterval(timerInt);
      try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);o.start();o.stop(ctx.currentTime+0.6);}catch(e){}
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      document.getElementById('timerOverlay').classList.remove('active');
    }
  },1000);
}
function renderTimer(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  const urgent=timerLeft<=10;
  document.getElementById('timerCount').textContent=`${m}:${s<10?'0':''}${s}`;
  document.getElementById('timerCount').className='timer-count'+(urgent?' urgent':'');
  const pct=(timerLeft/timerTotal)*100;
  const f=document.getElementById('timerFill');
  f.style.width=pct+'%';f.className='timer-fill'+(urgent?' urgent':'');
}
document.getElementById('timerSkip').addEventListener('click',()=>{clearInterval(timerInt);document.getElementById('timerOverlay').classList.remove('active');});

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function getHistory(exName,exIdx,dayName){
  const hist=[];
  Object.entries(P).forEach(([wk,wkd])=>{
    const ex=wkd.days[dayName]?.[exIdx];
    if(!ex||ex.name!==exName)return;
    const sets=parseInt(ex.working_sets)||2;
    const wkSets=[];
    for(let s=0;s<sets;s++){
      const wt=parseInt(ld(stk(wk,dayName,exIdx,s,'w'))||'0');
      const rp=parseInt(ld(stk(wk,dayName,exIdx,s,'r'))||'0');
      if(wt>0&&rp>0)wkSets.push({wt,rp});
    }
    if(wkSets.length)hist.push({wk,sets:wkSets});
  });
  return hist;
}
function bestSet(sets){return sets.reduce((b,s)=>s.wt*s.rp>b.wt*b.rp?s:b,sets[0]);}

function buildInlineProg(exName,exIdx,dayName){
  const hist=getHistory(exName,exIdx,dayName);
  if(!hist.length)return'';
  const recent=hist.slice(-3);
  const maxWt=Math.max(...recent.map(h=>bestSet(h.sets).wt));
  const rows=recent.map(h=>{
    const b=bestSet(h.sets);
    return`<div class="inline-prog-row"><span class="inline-wk">${h.wk.replace('Week ','W')}</span><span class="inline-val${b.wt===maxWt?' best':''}">${b.wt}lb × ${b.rp}</span></div>`;
  }).join('');
  return`<div class="inline-prog"><div class="inline-prog-label">Recent Progress</div><div class="inline-prog-rows">${rows}</div><div class="view-all-btn" data-exname="${exName}" data-exidx="${exIdx}" data-dayname="${dayName}">View full history ›</div></div>`;
}

function openProgress(exName,exIdx,dayName){
  document.getElementById('progTitle').textContent=exName;
  const hist=getHistory(exName,exIdx,dayName);
  const body=document.getElementById('progBody');body.innerHTML='';
  if(!hist.length){body.innerHTML='<div class="prog-empty">No data logged yet.<br>Complete some sets first to see your progress here.</div>';go('p');return;}
  const maxWt=Math.max(...hist.map(h=>bestSet(h.sets).wt));
  // Chart
  const chartEl=document.createElement('div');
  const barsHTML=hist.map(h=>{
    const b=bestSet(h.sets);const pct=maxWt>0?(b.wt/maxWt*100):100;const isBest=b.wt===maxWt;
    return`<div class="bar-col"><div class="bar-val">${isBest?b.wt+'lb':''}</div><div class="bar${isBest?' best':''}" style="height:${pct}%"></div><div class="bar-wk">${h.wk.replace('Week ','W')}</div></div>`;
  }).join('');
  chartEl.innerHTML=`<div class="section-title">Best Set Per Week</div><div class="chart-card"><div class="chart-bars">${barsHTML}</div><div class="max-label">Peak: <span>${maxWt}lb</span></div></div>`;
  body.appendChild(chartEl);
  // History
  const histEl=document.createElement('div');
  const histRows=hist.map(h=>{
    const b=bestSet(h.sets);
    const setsHTML=h.sets.map((s,si)=>`<div class="hist-set${s.wt===b.wt&&s.rp===b.rp?' best-set':''}">${si+1}. ${s.wt}lb × ${s.rp} reps${s.wt===b.wt&&s.rp===b.rp?' ★':''}</div>`).join('');
    return`<div class="hist-row"><div class="hist-wk">${h.wk.replace('Week ','W')}</div><div class="hist-sets">${setsHTML}</div></div>`;
  }).join('');
  histEl.innerHTML=`<div class="section-title" style="margin-top:4px">Full History</div><div class="hist-card">${histRows}</div>`;
  body.appendChild(histEl);
  go('p');
}

    const open=form.classList.toggle('open');
    document.getElementById('addExToggle').querySelector('span').textContent=open?'✕':'＋';
    if(open)setTimeout(()=>document.getElementById('customName').focus(),100);
  });

  document.getElementById('addExSubmit').addEventListener('click',()=>{
    const name=document.getElementById('customName').value.trim();
    if(!name){document.getElementById('customName').focus();return;}
    const sets=Math.max(1,parseInt(document.getElementById('customSets').value)||3);
    const reps=document.getElementById('customReps').value.trim()||'—';
    const rest=document.getElementById('customRest').value.trim()||'—';
    const arr=getCustomExercises(wk,dn);
    const newEx={name,sets,reps,rest,id:Date.now()};
    arr.push(newEx);
    saveCustomExercises(wk,dn,arr);
    // Clear form
    document.getElementById('customName').value='';
    document.getElementById('customReps').value='';
    document.getElementById('customRest').value='';
    document.getElementById('addExForm').classList.remove('open');
    document.getElementById('addExToggle').querySelector('span').textContent='＋';
    // Render the new card before the add card
    const addCard=document.getElementById('addExCard');
    const exBlock=buildCustomExBlock(wk,dn,newEx);
    document.getElementById('wkl').insertBefore(exBlock,addCard);
    setTimeout(()=>exBlock.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
    updateWorkoutMeta();
  });
}

function buildCustomExBlock(wk,dn,ex){
  const sets=ex.sets||3;
  let setRowsHTML=`<div class="set-table-head"><span>SET</span><span>REPS / WEIGHT</span><span>LOG</span></div>`;
  for(let s=0;s<sets;s++){
    const wt=ld(stk(wk,dn,'c'+ex.id,s,'w'))||'0';
    const rp=ld(stk(wk,dn,'c'+ex.id,s,'r'))||'0';
    const done=ld(stk(wk,dn,'c'+ex.id,s,'d'))==='1';
    const filled=wt!=='0'||rp!=='0';
    setRowsHTML+=`<div class="set-row${done?' logged':''}" id="sr_c${ex.id}_${s}">
      <div class="set-num" style="display:flex;flex-direction:column;align-items:center;gap:2px"><span>${s+1}</span></div>
      <div class="set-cell" style="flex-direction:column;gap:6px;align-items:stretch">
        <div style="display:flex;align-items:center;gap:2px">
          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);width:28px;flex-shrink:0">Reps</span>
          <div class="set-input-wrap" style="flex:1">
            <button class="set-adj" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="r" data-d="-1">−</button>
            <input type="number" inputmode="decimal" class="set-inp${filled?' filled':''}" id="rv_c${ex.id}_${s}" value="${rp}" min="0" step="1" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="r">
            <button class="set-adj" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="r" data-d="1">+</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:2px">
          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);width:28px;flex-shrink:0">Wt</span>
          <div class="set-input-wrap" style="flex:1">
            <button class="set-adj" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="w" data-d="-5">−</button>
            <input type="number" inputmode="decimal" class="set-inp${filled?' filled':''}" id="wv_c${ex.id}_${s}" value="${wt}" min="0" step="5" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="w">
            <button class="set-adj" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" data-f="w" data-d="5">+</button>
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:center">
        <div class="set-check${done?' done':''}" data-wk="${wk}" data-dn="${dn}" data-i="c${ex.id}" data-s="${s}" id="dc_c${ex.id}_${s}">
          <svg class="set-check-icon" viewBox="0 0 14 14"><polyline points="2,7 5.5,10.5 12,3.5"/></svg>
        </div>
      </div>
    </div>`;
  }

  const block=document.createElement('div');
  block.className='ex-block';block.id=`exC${ex.id}`;
  block.dataset.customId=ex.id;
  block.innerHTML=`
    <div class="ex-block-header">
      <div class="ex-num-badge" style="background:rgba(79,142,247,.15);color:var(--accent)">+</div>
      <div class="ex-block-info" style="flex:1">
        <div class="ex-block-name" style="cursor:default">${ex.name}<span class="custom-badge">Custom</span></div>
        <div class="ex-block-meta">
          <span class="ex-tag">${sets} sets</span>
          ${ex.reps!=='—'?`<span class="ex-tag reps">${ex.reps}</span>`:''}
          ${ex.rest!=='—'?`<span class="ex-tag rest-tag">⏱ ${ex.rest}</span>`:''}
        </div>
      </div>
      <button class="remove-custom" data-custom-id="${ex.id}" title="Remove">✕</button>
    </div>
    <div class="set-table">${setRowsHTML}</div>`;
  
  // Remove button
  block.querySelector('.remove-custom').addEventListener('click',()=>{
    if(!confirm('Remove this exercise?'))return;
    const arr=getCustomExercises(wk,dn).filter(e=>e.id!==ex.id);
    saveCustomExercises(wk,dn,arr);
    block.remove();
    updateWorkoutMeta();
  });

  return block;
}

function loadCustomExercises(wk,dn){
  const arr=getCustomExercises(wk,dn);
  const addCard=document.getElementById('addExCard');
  arr.forEach(ex=>{
    const block=buildCustomExBlock(wk,dn,ex);
    document.getElementById('wkl').insertBefore(block,addCard);
  });
}

// ── SWAP EXERCISE ─────────────────────────────────────────────────────────────
function swapExercise(exIdx,newName,newEmbed){
  const block=document.getElementById('ex'+exIdx);
  if(!block)return;

  // Get old exercise name + embed before replacing
  const nameEl=block.querySelector('.ex-block-name');
  const oldName=nameEl?nameEl.textContent.trim():'';
  const demoBtn=block.querySelector('.ex-demo-btn');
  const oldEmbed=demoBtn?demoBtn.dataset.embed:'';

  // Update name to the new exercise
  if(nameEl){nameEl.textContent=newName;nameEl.dataset.exname=newName;}

  // Update demo button
  if(demoBtn){
    if(newEmbed){demoBtn.dataset.embed=newEmbed;demoBtn.style.display='';}
    else{demoBtn.style.display='none';}
  }

  // Find the subs section and add the old exercise as a new sub row
  // Also remove the "Use This" button from the swapped-in sub
  const subsSection=block.querySelector('.subs-section');
  if(subsSection&&oldName){
    // Remove the "Use This" button from the sub we just used
    const usedBtn=subsSection.querySelector(`.sub-swap[data-name="${newName}"]`);
    if(usedBtn){
      const row=usedBtn.closest('.sub-item');
      if(row)row.remove();
    }
    // Add old exercise as a new sub row at top of subs list
    const vl=VL[oldName];
    const oldEmb=vl?vl.embed||oldEmbed:oldEmbed;
    const newRow=document.createElement('div');
    newRow.className='sub-item';
    newRow.innerHTML=`<span class="sub-name">${oldName}</span>
      <div style="display:flex;gap:6px;align-items:center">
        ${oldEmb?`<button class="sub-demo" data-embed="${oldEmb}" data-name="${oldName}" data-exidx="${exIdx}">▶ Demo</button>`:''}
        <button class="sub-swap" data-name="${oldName}" data-embed="${oldEmb}" data-exidx="${exIdx}" style="background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);border-radius:8px;color:var(--accent);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">Use This</button>
      </div>`;
    // Insert at top of subs list
    const firstSub=subsSection.querySelector('.sub-item');
    if(firstSub)subsSection.insertBefore(newRow,firstSub);
    else subsSection.appendChild(newRow);
  }

  // Close any open video
  const vid=block.querySelector('[id^="vid"]');
  if(vid){vid.innerHTML='';vid.classList.remove('open');}

  // Visual flash
  const nameWrap=block.querySelector('.ex-block-info');
  if(nameWrap){
    nameWrap.style.transition='background .3s';
    nameWrap.style.background='rgba(79,142,247,.12)';
    setTimeout(()=>{nameWrap.style.background='';},600);
  }
  setTimeout(()=>block.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

buildHome();
